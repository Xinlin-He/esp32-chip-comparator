    <title>ESP32 Chip Comparator | 芯片对比专家</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>:root {
    --bg-color: #0a0c10;
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.08);
    --primary: #4f46e5;
    --primary-light: #818cf8;
    --secondary: #0ea5e9;
    --accent: #f43f5e;
    --text-main: #f8fafc;
    --text-dim: #94a3b8;
    --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    --shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: var(--bg-color);
    color: var(--text-main);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.6;
    overflow-x: hidden;
    min-height: 100vh;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 2rem;
}

/* Background Blobs */
.background-blobs {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
}

.blob {
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
    opacity: 0.15;
    filter: blur(80px);
    border-radius: 50%;
    animation: move 20s infinite alternate;
}

.blob-1 { top: -10%; left: -10%; background: radial-gradient(circle, var(--primary) 0%, transparent 70%); }
.blob-2 { bottom: -10%; right: -10%; background: radial-gradient(circle, var(--secondary) 0%, transparent 70%); animation-delay: -5s; }
.blob-3 { top: 40%; left: 30%; background: radial-gradient(circle, var(--accent) 0%, transparent 70%); width: 400px; height: 400px; animation-delay: -10s; }

@keyframes move {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(100px, 100px) scale(1.1); }
}

header {
    padding: 4rem 0 2rem;
    text-align: center;
}

.logo {
    font-family: 'Outfit', sans-serif;
    font-size: 3.5rem;
    font-weight: 800;
    letter-spacing: -2px;
    margin-bottom: 0.5rem;
    background: linear-gradient(to right, #fff, var(--primary-light));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}

.logo span {
    font-weight: 400;
    color: var(--text-dim);
}

.subtitle {
    font-size: 1.1rem;
    color: var(--text-dim);
    font-weight: 300;
}

.glass {
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    box-shadow: var(--shadow);
}

section {
    margin-bottom: 3rem;
}

h2 {
    font-family: 'Outfit', sans-serif;
    font-size: 1.5rem;
    margin-bottom: 2rem;
    font-weight: 600;
}

/* Compact Selection Panel */
.panel-header-compact {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
}

.panel-header-compact h2 {
    margin-bottom: 0;
    font-size: 1.2rem;
}

.selection-actions-top {
    display: flex;
    gap: 0.75rem;
    align-items: center;
}

.btn-tiny {
    padding: 0.3rem 0.8rem;
    font-size: 0.75rem;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 8px;
    color: var(--text-dim);
    border: 1px solid var(--glass-border);
    cursor: pointer;
}

.badge-tiny {
    background: var(--primary);
    color: #fff;
    font-size: 0.75rem;
    padding: 0.3rem 0.8rem;
    border-radius: 8px;
    font-weight: 700;
}

.chip-groups-compact {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
}

.series-group-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 0.75rem;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    padding-bottom: 0.4rem;
}

.series-group-header h3 {
    font-size: 1.1rem;
    color: #fff;
    margin: 0;
    min-width: 80px;
}

.series-pos-desc {
    font-size: 0.8rem;
    color: var(--text-dim);
    font-weight: 300;
}

.chip-grid-compact {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
}

.chip-card-compact {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--glass-border);
    padding: 0.5rem 0.9rem;
    border-radius: 10px;
    cursor: pointer;
    transition: var(--transition);
    font-size: 0.9rem;
    font-weight: 500;
}

.chip-card-compact:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: var(--primary-light);
}

.chip-card-compact.selected {
    background: var(--primary);
    border-color: var(--primary-light);
    color: #fff;
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
}

/* Updated Feature Labels */
        tr.clickable-row {
            cursor: pointer;
            transition: var(--transition);
        }

        tr.clickable-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .explanation-row td {
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 2px solid var(--primary);
            padding: 0;
            overflow: hidden;
        }

        .explanation-content {
            padding: 1.2rem 2rem;
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.6;
            animation: slideDown 0.3s ease-out;
            max-width: 1000px;
        }

        .explanation-content b {
            color: var(--primary-light);
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feature-label {
    font-size: 0.85rem;
}

td, th {
    padding: 0.8rem 1rem;
    font-size: 0.9rem;
}

/* Category Tabs */
.detailed-comparison-tools {
    margin-bottom: 1.5rem;
    border-bottom: 1px solid var(--glass-border);
    padding-bottom: 1rem;
}

.category-tabs {
    display: flex;
    gap: 0.5rem;
    overflow-x: auto;
    padding-bottom: 0.5rem;
}

.tab-btn {
    padding: 0.6rem 1.2rem;
    border-radius: 30px;
    border: 1px solid var(--glass-border);
    background: transparent;
    color: var(--text-dim);
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: var(--transition);
}

.tab-btn:hover {
    border-color: var(--primary-light);
    color: #fff;
}

.tab-btn.active {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
}

/* Peripheral Search */
.search-container {
    margin-bottom: 1.5rem;
    animation: fadeIn 0.4s var(--transition);
}

#peripheral-search {
    width: 100%;
    padding: 0.8rem 1.2rem;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    color: #fff;
    font-size: 1rem;
    transition: var(--transition);
}

#peripheral-search:focus {
    outline: none;
    border-color: var(--primary-light);
    background: rgba(255, 255, 255, 0.08);
    box-shadow: 0 0 15px rgba(79, 70, 229, 0.2);
}

.search-container.hidden {
    display: none;
}
.single-chip-hero {
    display: flex;
    gap: 2rem;
    align-items: center;
    margin-bottom: 2.5rem;
    padding: 2rem;
    background: linear-gradient(135deg, rgba(79, 70, 229, 0.1) 0%, transparent 100%);
    border-radius: 20px;
}

.chip-icon-large {
    font-size: 4rem;
    background: var(--glass-bg);
    width: 100px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 24px;
    border: 1px solid var(--glass-border);
}

.single-chip-header h2 {
    font-size: 2.5rem;
    margin-bottom: 0.2rem;
}

.single-chip-header .highlight-tag {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    padding: 0.2rem 0.8rem;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 800;
    text-transform: uppercase;
}

.chip-card .series {
    display: block;
    font-size: 0.75rem;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 0.2rem;
}

.chip-card.selected .series {
    color: rgba(255, 255, 255, 0.8);
}

.selection-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.btn {
    padding: 0.75rem 1.5rem;
    border-radius: 12px;
    border: none;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
}

.btn-secondary {
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-main);
}

.btn-secondary:hover {
    background: rgba(255, 255, 255, 0.1);
}

.badge {
    background: var(--primary);
    padding: 0.5rem 1rem;
    border-radius: 30px;
    font-size: 0.85rem;
    font-weight: 600;
}

/* Comparison Panel */
.comparison-panel {
    padding: 2rem;
    animation: fadeIn 0.8s var(--transition);
}

.panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
}

.comparison-scroll-container {
    overflow-x: auto;
    margin: 0 -2rem;
    padding: 0 2rem;
}

table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    min-width: 800px;
}

th, td {
    padding: 1.25rem;
    text-align: left;
    border-bottom: 1px solid var(--glass-border);
}

th {
    font-family: 'Outfit', sans-serif;
    color: var(--text-dim);
    font-weight: 600;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.feature-label {
    min-width: 150px;
    font-weight: 600;
    color: var(--primary-light);
    background: rgba(79, 70, 229, 0.03);
}

.chip-header {
    font-size: 1.2rem;
    font-weight: 700;
    color: #fff;
    min-width: 200px;
}

.superior {
    color: #4ade80; /* Green highlight for better specs */
    font-weight: 700;
}

.inferior {
    opacity: 0.6;
}

/* States */
.hidden { display: none; }

.empty-state {
    text-align: center;
    padding: 5rem 0;
    color: var(--text-dim);
}

.empty-state .icon {
    font-size: 4rem;
    margin-bottom: 1rem;
    opacity: 0.2;
}

@keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

footer {
    padding: 4rem 0;
    text-align: center;
    color: var(--text-dim);
    font-size: 0.85rem;
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-color); }
::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
</style>
</head>

async function init() {
    try {
        
        chipsData = embeddedChipsData;
        
        const periKeys = new Set();
        Object.values(chipsData.chips).forEach(chip => {
            if (chip.peripherals) {
                Object.keys(chip.peripherals).forEach(k => periKeys.add(k));
            }
        });
        featureGroups.peri = Array.from(periKeys).sort().map(k => ({ key: k, label: k, isPeri: true }));

        renderChipSelector();
        setupTabs();
        setupSearch();
    } catch (error) {
        console.error('Error loading chips data:', error);
    }
}

function setupSearch() {
    const searchInput = document.getElementById('peripheral-search');
    if (!searchInput) return;
    searchInput.oninput = (e) => {
        periSearchQuery = e.target.value.toLowerCase();
        renderComparison();
    };
}

function renderChipSelector() {
    const selector = document.getElementById('chip-selector');
    selector.innerHTML = '';
    const grouped = {};
    Object.entries(chipsData.chips).forEach(([name, data]) => {
        if (!grouped[data.series]) grouped[data.series] = [];
        grouped[data.series].push({ name, ...data });
    });
    const order = ['S', 'C', 'H', 'P', 'Original'];
    order.forEach(series => {
        if (grouped[series]) {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'series-group';
            groupDiv.innerHTML = `
                <div class="series-group-header">
                    <h3>${series} 系列</h3>
                    <span class="series-pos-desc">${chipsData.series_info[series] || ''}</span>
                </div>
                <div class="chip-grid-compact"></div>
            `;
            const grid = groupDiv.querySelector('.chip-grid-compact');
            grouped[series].forEach(chip => {
                const card = document.createElement('div');
                card.className = `chip-card-compact ${selectedChips.includes(chip.name) ? 'selected' : ''}`;
                card.innerHTML = chip.name;
                card.onclick = () => toggleChip(chip.name, card);
                grid.appendChild(card);
            });
            selector.appendChild(groupDiv);
        }
    });
}

function setupTabs() {
    const buttons = document.querySelectorAll('.tab-btn');
    const searchContainer = document.getElementById('peripheral-search-container');
    
    buttons.forEach(btn => {
        btn.onclick = () => {
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeCategory = btn.dataset.category;
            
            if (searchContainer) {
                if (activeCategory === 'peri') {
                    searchContainer.classList.remove('hidden');
                } else {
                    searchContainer.classList.add('hidden');
                }
            }
            
            renderComparison();
        };
    });
}

function toggleChip(name, element) {
    const index = selectedChips.indexOf(name);
    if (index > -1) {
        selectedChips.splice(index, 1);
        element.classList.remove('selected');
    } else {
        selectedChips.push(name);
        element.classList.add('selected');
    }
    updateUI();
}

function updateUI() {
    const comparisonSection = document.getElementById('comparison-section');
    const emptyState = document.getElementById('empty-state');
    const countBadge = document.getElementById('selection-count');
    if (countBadge) countBadge.textContent = `已选 ${selectedChips.length}`;
    if (selectedChips.length >= 1) {
        comparisonSection.classList.remove('hidden');
        emptyState.classList.add('hidden');
        renderComparison();
    } else {
        comparisonSection.classList.add('hidden');
        emptyState.classList.remove('hidden');
    }
}

function renderComparison() {
    const modeContainer = document.getElementById('view-mode-container');
    if (selectedChips.length === 1) {
        renderSingleView(selectedChips[0], modeContainer);
    } else {
        renderMultiView(modeContainer);
    }
}

function renderSingleView(name, container) {
    const chip = chipsData.chips[name];
    const highlight = getChipHighlight(name, chip);

    container.innerHTML = `
        <div class="single-chip-hero">
            <div class="chip-icon-large">SoC</div>
            <div class="single-chip-header">
                <h2>${name}</h2>
                <div class="highlight-tag">${highlight}</div>
                <p style="margin-top: 0.5rem; color: var(--text-dim)">${chipsData.series_info[chip.series]}</p>
            </div>
        </div>
    `;
    renderMultiView(document.createElement('div'), true); 
}

function renderMultiView(container, isSingleDetail = false) {
    const thead = document.getElementById('table-head');
    const tbody = document.getElementById('table-body');
    let currentFeatures = featureGroups[activeCategory];

    if (activeCategory === 'peri' && periSearchQuery) {
        currentFeatures = currentFeatures.filter(f => f.label.toLowerCase().includes(periSearchQuery));
    }

    thead.innerHTML = `
        <tr>
            <th class="feature-label">特性 / ${getCategoryLabel(activeCategory)} (点击行查看说明)</th>
            ${selectedChips.map(name => `<th class="chip-header">${name}</th>`).join('')}
        </tr>
    `;

    if (currentFeatures.length === 0 && activeCategory === 'peri') {
        tbody.innerHTML = `<tr><td colspan="${selectedChips.length + 1}" style="text-align: center; color: var(--text-dim); padding: 3rem;">未找到相关外设内容</td></tr>`;
        return;
    }

    tbody.innerHTML = '';
    currentFeatures.forEach(feature => {
        let values;
        if (feature.isPeri) {
            values = selectedChips.map(name => chipsData.chips[name].peripherals ? (chipsData.chips[name].peripherals[feature.key] || 'N/A') : 'N/A');
        } else {
            values = selectedChips.map(name => chipsData.chips[name][feature.key] || 'N/A');
        }
        
        const tr = document.createElement('tr');
        tr.className = 'clickable-row';
        tr.dataset.feature = feature.key;
        tr.innerHTML = `
            <td class="feature-label">${feature.label}</td>
            ${selectedChips.map((name, i) => {
                const value = values[i];
                const isSuperior = !isSingleDetail && !feature.isPeri && checkSuperior(feature.key, value, values);
                return `<td class="${isSuperior ? 'superior' : ''}">${value}</td>`;
            }).join('')}
        `;
        
        tr.onclick = (e) => toggleRowExplanation(feature, tr);
        tbody.appendChild(tr);
    });

    if (!isSingleDetail) {
        const modeContainer = document.getElementById('view-mode-container');
        modeContainer.innerHTML = `<h2 style="margin-bottom: 1rem">对比矩阵</h2>`;
    }
}

function toggleRowExplanation(feature, row) {
    const nextRow = row.nextElementSibling;
    if (nextRow && nextRow.classList.contains('explanation-row')) {
        nextRow.remove();
        return;
    }

    // Remove other expanded rows in this table if desired (accordion style)
    // Removed for multi-expansion support

    const explTr = document.createElement('tr');
    explTr.className = 'explanation-row';
    const cellCount = selectedChips.length + 1;
    
    const explanationText = featureExplanations[feature.key] || `<b>${feature.label}</b>：暂无详细说明。该参数决定了芯片的 ${feature.label} 性能。`;
    
    explTr.innerHTML = `
        <td colspan="${cellCount}">
            <div class="explanation-content">
                ${explanationText}
            </div>
        </td>
    `;
    
    row.after(explTr);
}

function getCategoryLabel(cat) {
    switch(cat) {
        case 'main': return '主要特性';
        case 'core': return '核心与存储';
        case 'comm': return '无线通信';
        case 'power': return '功耗管理';
        case 'peri': return '外设资源';
        default: return '';
    }
}

function getChipHighlight(name, chip) {
    if (chip.series === 'S') return '高性能无线专家';
    if (chip.series === 'C') return '极致性价比之选';
    if (chip.series === 'H') return '智能家居核心 (Matter/Thread)';
    if (chip.series === 'P') return '工业级高性能全能王';
    return '经典之作';
}

function checkSuperior(key, value, allValues) {
    if (value === 'N/A' || allValues.length < 2) return false;
    const numericKeys = ['freq', 'gpio', 'ls', 'ds', 'rom', 'sram'];
    if (numericKeys.includes(key)) {
        const numValue = value.toString().replace(/[^0-9.]/g, '');
        const num = parseFloat(numValue);
        if (isNaN(num)) return false;
        const nums = allValues.map(v => parseFloat(v.toString().replace(/[^0-9.]/g, ''))).filter(v => !isNaN(v));
        if (key === 'ls' || key === 'ds') return num === Math.min(...nums);
        return num === Math.max(...nums);
    }
    if (key === 'wifi' && value.includes('ax')) return true;
    if (key === 'ble' && (value.includes('6.0') || value.includes('5.4'))) return true;
    return false;
}

document.getElementById('clear-selection').onclick = () => {
    selectedChips = [];
    document.querySelectorAll('.chip-card-compact').forEach(c => c.classList.remove('selected'));
    updateUI();
};

init();
